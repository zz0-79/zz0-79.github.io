<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>猫猫安慰站v2</title>
    <meta name="description" content="点开就是猫猫：点赞、加爱心、换一只。可选接入 TheCatAPI（x-api-key）。" />
    <style>
      :root{
        --bg1:#fff7fb; --bg2:#f3fbff; --card:#ffffffcc;
        --text:#2b2b2b; --muted:#6b6b6b;
        --pink:#ff5aa5; --purple:#7a5cff; --blue:#31b5ff;
        --shadow: 0 18px 60px rgba(30, 30, 60, 0.12);
        --r: 18px;
      }
      *{ box-sizing:border-box; }
      body{
        margin:0;
        min-height:100vh;
        font-family: ui-sans-serif, system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
        color:var(--text);
        background:
          radial-gradient(1200px 800px at 15% 15%, rgba(255,90,165,0.18), transparent 55%),
          radial-gradient(1000px 700px at 80% 20%, rgba(49,181,255,0.18), transparent 55%),
          radial-gradient(900px 700px at 60% 90%, rgba(122,92,255,0.14), transparent 55%),
          linear-gradient(140deg, var(--bg1), var(--bg2));
        padding: 26px 14px 70px;
      }
      .wrap{ width:min(980px,100%); margin:0 auto; }
      .card{
        background: var(--card);
        border: 1px solid rgba(255,255,255,.55);
        backdrop-filter: blur(10px);
        border-radius: var(--r);
        box-shadow: var(--shadow);
        overflow:hidden;
      }
      header{ padding: 18px 18px 10px; }
      h1{ margin:0 0 6px; font-size: clamp(22px, 3vw, 34px); }
      p{ margin:0; color:var(--muted); line-height:1.6; }
      .grid{
        display:grid;
        grid-template-columns: 1.1fr .9fr;
        gap: 14px;
        padding: 0 18px 18px;
      }
      @media (max-width: 860px){ .grid{ grid-template-columns: 1fr; } }
      .pic{
        background: rgba(255,255,255,.70);
        border: 1px solid rgba(0,0,0,.06);
        border-radius: 16px;
        overflow:hidden;
        box-shadow: 0 14px 26px rgba(0,0,0,.08);
      }
      .pic img{ width:100%; height: 360px; object-fit: cover; display:block; }
      @media (max-width: 860px){ .pic img{ height: 320px; } }
      .meta{
        display:flex; justify-content:space-between; align-items:center;
        gap: 10px; flex-wrap:wrap;
        padding: 10px 12px;
        color: var(--muted);
        font-size: 12px;
      }
      .meta code{
        background: rgba(255,255,255,.7);
        border: 1px solid rgba(0,0,0,.06);
        border-radius: 999px;
        padding: 2px 8px;
      }
      .panel{
        background: rgba(255,255,255,.70);
        border: 1px solid rgba(0,0,0,.06);
        border-radius: 16px;
        padding: 14px 12px;
        box-shadow: 0 14px 26px rgba(0,0,0,.06);
      }
      .msg{
        font-size: 16px;
        line-height: 1.75;
        margin: 0 0 12px;
      }
      .row{ display:flex; gap:10px; flex-wrap:wrap; }
      button{
        appearance:none; border:0; cursor:pointer;
        border-radius: 999px;
        padding: 12px 14px;
        background:#fff;
        border: 1px solid rgba(0,0,0,.06);
        box-shadow: 0 10px 22px rgba(0,0,0,.08);
        font-weight: 700;
        display:flex; align-items:center; gap: 8px;
        transition: transform .12s ease, box-shadow .12s ease;
        user-select:none;
      }
      button:hover{ transform: translateY(-1px); box-shadow: 0 14px 26px rgba(0,0,0,.10); }
      button:active{ transform: translateY(1px) scale(.99); }
      .primary{
        background: linear-gradient(180deg, rgba(255,90,165,.95), rgba(122,92,255,.90));
        color:#fff; border: 1px solid rgba(255,255,255,.22);
      }
      details{
        margin-top: 12px;
        background: rgba(255,255,255,.55);
        border: 1px solid rgba(255,255,255,.65);
        border-radius: 14px;
        padding: 10px 12px;
      }
      summary{ cursor:pointer; font-weight: 800; }
      label{ display:grid; gap:6px; margin-top: 10px; font-size: 13px; color: var(--muted); }
      input{
        padding: 12px 12px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,.10);
        background: rgba(255,255,255,.85);
        outline:none;
      }
      input:focus{ border-color: rgba(122,92,255,.55); box-shadow: 0 0 0 3px rgba(122,92,255,.15); }
      .mini{ font-size:12px; color: var(--muted); line-height:1.55; margin-top: 8px; }

      /* 小爱心 */
      .heart{
        position: fixed;
        left: 0; top: 0;
        width: 14px; height: 14px;
        transform: translate(-50%, -50%) rotate(45deg);
        background: var(--pink);
        border-radius: 3px;
        pointer-events:none;
        opacity: .95;
        z-index: 9999;
        animation: fly 1.1s ease-out forwards;
      }
      .heart::before, .heart::after{
        content:""; position:absolute; width:14px; height:14px; border-radius:50%; background:inherit;
      }
      .heart::before{ left:-7px; top:0; }
      .heart::after{ left:0; top:-7px; }
      @keyframes fly{
        0%{ transform: translate(-50%, -50%) rotate(45deg) scale(1); opacity: .95; }
        100%{ transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(45deg) scale(.8); opacity: 0; }
      }
      .toast{
        position: fixed;
        left: 50%;
        bottom: 18px;
        transform: translateX(-50%);
        background: rgba(0,0,0,.72);
        color:#fff;
        padding: 10px 14px;
        border-radius: 999px;
        font-size: 13px;
        opacity: 0;
        pointer-events:none;
        transition: opacity .2s ease, transform .2s ease;
        z-index: 9999;
      }
      .toast.show{ opacity:1; transform: translateX(-50%) translateY(-6px); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <main class="card">
        <header>
          <h1>猫猫安慰站</h1>
          <p>点开就是猫猫。你可以点赞、加爱心、换一只。今天也要对自己温柔一点。</p>
        </header>

        <section class="grid">
          <div class="pic" aria-label="猫猫图片">
            <img id="catImg" alt="一只来安慰你的猫猫" />
            <div class="meta">
              <span>当前猫猫：<code id="catId">-</code></span>
              <span id="catSize">-</span>
            </div>
          </div>

          <div class="panel">
            <p id="msg" class="msg">不管你今天经历了什么，你都值得被好好对待。</p>
            <div class="row">
              <button id="nextBtn" class="primary" type="button">🐱 换一只猫猫</button>
              <button id="likeBtn" type="button">👍 点赞 <span id="likeN">0</span></button>
              <button id="heartBtn" type="button">💗 加爱心 <span id="heartN">0</span></button>
            </div>

            <details>
              <summary>可选：接入 TheCatAPI</summary>
              <label>
                图片接口（建议：<code>https://api.thecatapi.com/v1/images/search?limit=1</code>）
                <input id="apiUrl" placeholder="https://api.thecatapi.com/v1/images/search?limit=1" />
              </label>
              <label>
                API Key（会作为请求头 <code>x-api-key</code> 发送；仅保存在你的浏览器）
                <input id="apiKey" placeholder="live_xxx（不要公开分享）" />
              </label>
              <div class="row" style="margin-top:10px;">
                <button id="saveBtn" type="button">💾 保存</button>
                <button id="testBtn" type="button">🔎 测试并换猫</button>
              </div>
              <div class="mini">
                提示：前端直连会暴露 key，建议只在你自己的电脑上使用；线上建议用后端代理。
              </div>
            </details>
          </div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script>
      const $ = (id) => document.getElementById(id);
      const LS = { apiUrl: "cc.apiUrl", apiKey: "cc.apiKey", likes: "cc.likes", hearts: "cc.hearts" };

      const comfort = [
        "你可以慢一点，也可以停下来；你不需要一直坚强。",
        "今天先把自己照顾好，别的事情以后再说。",
        "如果你觉得累，那不是你不行，是你已经很努力了。",
        "你已经走了很远的路了，真的很了不起。",
        "深呼吸一下：吸气——呼气——再轻轻放松一点点。",
      ];

      const CAT_LIST = [
        {"id":"LSaDk6OjY","url":"https://cdn2.thecatapi.com/images/LSaDk6OjY.jpg","width":1080,"height":1080},
        {"id":"IFXsxmXLm","url":"https://cdn2.thecatapi.com/images/IFXsxmXLm.jpg","width":973,"height":973},
        {"id":"8ciqdpaO5","url":"https://cdn2.thecatapi.com/images/8ciqdpaO5.jpg","width":1080,"height":809},
        {"id":"VZ3qFLIe3","url":"https://cdn2.thecatapi.com/images/VZ3qFLIe3.jpg","width":750,"height":937},
        {"id":"Rl39SPjDO","url":"https://cdn2.thecatapi.com/images/Rl39SPjDO.png","width":1198,"height":1379},
        {"id":"O3btzLlsO","url":"https://cdn2.thecatapi.com/images/O3btzLlsO.png","width":1100,"height":739},
        {"id":"dN6eoeLjY","url":"https://cdn2.thecatapi.com/images/dN6eoeLjY.jpg","width":3648,"height":2736},
        {"id":"H_UWbOfra","url":"https://cdn2.thecatapi.com/images/H_UWbOfra.jpg","width":1200,"height":1200},
        {"id":"bz15V3Kvg","url":"https://cdn2.thecatapi.com/images/bz15V3Kvg.jpg","width":1440,"height":1080},
        {"id":"sPMOo3Jn2","url":"https://cdn2.thecatapi.com/images/sPMOo3Jn2.jpg","width":880,"height":1100},
      ];

      let CURRENT = null;
      function rand(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
      function getNum(k){ const v = Number(localStorage.getItem(k) || "0"); return Number.isFinite(v) ? v : 0; }
      function setNum(k,v){ localStorage.setItem(k, String(v)); }
      function catKey(kind, id){ return `cc.cat.${kind}.${id || "unknown"}`; }

      function toast(text){
        const el = $("toast");
        el.textContent = text;
        el.classList.add("show");
        clearTimeout(toast._t);
        toast._t = setTimeout(() => el.classList.remove("show"), 1200);
      }
      function spawnHeart(x,y){
        const h = document.createElement("div");
        h.className = "heart";
        h.style.left = x + "px";
        h.style.top = y + "px";
        h.style.setProperty("--dx", (Math.random()*120-60).toFixed(0)+"px");
        h.style.setProperty("--dy", (-80 - Math.random()*140).toFixed(0)+"px");
        document.body.appendChild(h);
        h.addEventListener("animationend", () => h.remove());
      }

      function setCat(cat){
        CURRENT = cat;
        $("catImg").src = cat.url;
        $("catId").textContent = cat.id || "-";
        $("catSize").textContent = (cat.width && cat.height) ? `${cat.width}×${cat.height}` : "-";
        $("msg").textContent = rand(comfort);
        renderCounts();
      }

      function renderCounts(){
        const id = CURRENT?.id || "unknown";
        $("likeN").textContent = getNum(catKey("likes", id));
        $("heartN").textContent = getNum(catKey("hearts", id));
      }

      async function nextCatFromApi(){
        const apiUrl = (localStorage.getItem(LS.apiUrl) || "").trim() || "https://api.thecatapi.com/v1/images/search?limit=1";
        const apiKey = (localStorage.getItem(LS.apiKey) || "").trim();
        const headers = {};
        if(apiKey) headers["x-api-key"] = apiKey;
        const res = await fetch(apiUrl, { method:"GET", headers });
        if(!res.ok) throw new Error("接口状态码：" + res.status);
        const data = await res.json();
        const item = Array.isArray(data) ? data[0] : data;
        if(!item?.url) throw new Error("接口没返回 url");
        return { id: item.id || "api-cat", url: item.url, width: item.width, height: item.height };
      }

      $("nextBtn").addEventListener("click", async () => {
        try{
          const cat = await nextCatFromApi();
          setCat(cat);
          toast("猫猫已切换～");
          return;
        }catch(e){
          // API 不可用就用内置列表
          console.warn(e);
        }
        let n = rand(CAT_LIST);
        for(let i=0;i<6 && n?.id === CURRENT?.id;i++) n = rand(CAT_LIST);
        setCat(n);
        toast("猫猫已切换～");
      });

      $("likeBtn").addEventListener("click", (e) => {
        const id = CURRENT?.id || "unknown";
        setNum(catKey("likes", id), getNum(catKey("likes", id)) + 1);
        renderCounts();
        toast("收到你的赞！也给你点个赞。");
        const r = e.currentTarget.getBoundingClientRect();
        spawnHeart(r.left + r.width*0.75, r.top + r.height*0.45);
      });

      $("heartBtn").addEventListener("click", (e) => {
        const id = CURRENT?.id || "unknown";
        setNum(catKey("hearts", id), getNum(catKey("hearts", id)) + 1);
        setNum(LS.hearts, getNum(LS.hearts) + 1);
        renderCounts();
        const r = e.currentTarget.getBoundingClientRect();
        const x = r.left + r.width*(0.25 + Math.random()*0.5);
        const y = r.top + r.height*0.5;
        for(let i=0;i<6;i++) setTimeout(() => spawnHeart(x,y), i*40);
        toast("爱心已送达！");
      });

      $("saveBtn").addEventListener("click", () => {
        localStorage.setItem(LS.apiUrl, $("apiUrl").value.trim());
        localStorage.setItem(LS.apiKey, $("apiKey").value.trim());
        toast("已保存设置。");
      });
      $("testBtn").addEventListener("click", async () => {
        localStorage.setItem(LS.apiUrl, $("apiUrl").value.trim());
        localStorage.setItem(LS.apiKey, $("apiKey").value.trim());
        try{
          const cat = await nextCatFromApi();
          setCat(cat);
          toast("接口 OK，已换猫。");
        }catch(e){
          alert("测试失败：\n" + (e?.message || String(e)));
        }
      });

      // init
      $("apiUrl").value = localStorage.getItem(LS.apiUrl) || "https://api.thecatapi.com/v1/images/search?limit=1";
      $("apiKey").value = localStorage.getItem(LS.apiKey) || "";
      setCat(rand(CAT_LIST));
    </script>
  </body>
</html>
